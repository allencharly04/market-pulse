# ============================================================
# Agent 29 — Ticker Registry
# ============================================================
# Each entry: ticker → list of name aliases that should resolve to it.
# Aliases are case-insensitive and matched as whole words only.
# Add/remove tickers freely — no code changes needed.
# ============================================================

