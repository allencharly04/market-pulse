# === Tickers to NEVER auto-match ===
# These cause too many false positives — only match if explicit cashtag like $A
ambiguous:
  - "A"      # too short — Agilent, but "A" appears everywhere
  - "I"      # Intelligent Systems
  - "U"      # Unity Software
  - "X"      # United States Steel
  - "T"      # AT&T — but "T" appears in countless contexts
  - "M"      # Macy's
  - "K"      # Kellogg
  - "AI"     # C3.ai — but "AI" is everywhere now
  - "ON"     # ON Semi
  - "NEW"    # Puxin
  - "CEO"    # not a ticker but often misread
  - "GO"     # not a ticker but flag for safety

# === Crypto slang/aliases that are too generic ===
crypto_ambiguous:
  - "GAS"    # too generic
  - "POW"    # too generic
  - "POS"    # too generic
